<html>
    <body>
        <h2>Name Age predictor</h2>
        <form id="myForm">
            <input type="text" id = "inputName" placeholder="Enter your name">
            <button type="submit">Predict Age</button>
        </form>
        <h3 id="result"></h3>
        <script>
            const form = document.getElementById("myForm");
            form.addEventListener('submit', function(event) {
                event.preventDefault();
                let name = document.getElementById("inputName").value;

                if(name.trim() === '') {
                    document.getElementById("result").innerHTML = 'Please enter a name.';
                    return;
                }
                fetch("https://api.agify.io?name="+name)
                    .then(response => response.json())
                    .then(data => {
                        document.getElementById("result").innerHTML = 
                        "The predicted age for the name " + name + " is: " + data.age;
                    })
                    .catch(error => {
                        console.error('Error fetching data:', error);
                        document.getElementById("result").innerHTML = "An error occurred while fetching data.";
                    });
                });
        </script>
    </body>
</html>
