<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table Tags Example</title>
    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse; /* Optional: for single border lines */
            padding: 10px;
        }
        th {
            background-color: #f2f2f2;
        }
        tr{background-color:pink;}
    </style>
</head>
<body>

    <h1>Example of HTML Table Tags</h1>

    <table >
        <!-- The <caption> tag defines a table caption -->
        <caption>Monthly Savings Data</caption>
        
        <!-- The <colgroup> and <col> tags specify column properties for formatting -->
        
        <!-- The <thead> tag groups the header content -->
        <thead>
            
                <!-- The <th> tag defines a header cell -->
                <th>Month</th>
                <th>Savings</th>
                <th>Goal Met?</th>
            
        </thead>
        
        <!-- The <tbody> tag groups the body content -->
        <tbody>
            <tr>
                <!-- The <td> tag defines a standard data cell -->
                <td>January</td>
                <td>$100</td>
                <td>No</td>
            </tr>
            <tr>
                <td>February</td>
                <td>$80</td>
                <td>No</td>
            </tr>
        </tbody>
        
        <!-- The <tfoot> tag groups the footer content -->
        <tfoot>
            <tr>
                <td>Total</td>
                <td colspan="2">$180</td>
              
            </tr>
        </tfoot>
    </table>

</body>
</html>
